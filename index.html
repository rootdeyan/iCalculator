<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurum Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c8a96e;
      --gold-light: #d8bc84;
      --gold-dark:  #b8942a;
      --gold-text:  #2a1f08;
    }

    [data-theme="dark"] {
      --bg-body:    #1e1f24;
      --bg-calc:    #25262d;
      --bg-btn:     #2c2d35;
      --bg-btn-fn:  #28292f;
      --bg-btn-hov: #333441;
      --bg-op-hov:  #33312a;
      --bg-fn-hov:  #2e2f38;
      --bg-clr-hov: #2d2523;
      --border:     #35363f;
      --border-div: rgba(200,169,110,0.18);
      --text-main:  #e8e4dc;
      --text-num:   #d4d0c8;
      --text-op:    #c8a96e;
      --text-fn:    #9896a0;
      --text-clr:   #b06458;
      --text-expr:  #5a5b68;
      --brand-col:  #c8a96e;
      --brand-op:   0.65;
      --inset:      rgba(255,255,255,0.06);
      --glow-a:     rgba(200,170,100,0.07);
      --glow-b:     rgba(100,120,180,0.06);
    }

    [data-theme="light"] {
      --bg-body:    #f0ede6;
      --bg-calc:    #faf8f4;
      --bg-btn:     #f0ede5;
      --bg-btn-fn:  #e8e4db;
      --bg-btn-hov: #e4e0d6;
      --bg-op-hov:  #f5ead0;
      --bg-fn-hov:  #dddad0;
      --bg-clr-hov: #f5e0dc;
      --border:     #dedad0;
      --border-div: rgba(180,140,50,0.2);
      --text-main:  #1e1c18;
      --text-num:   #2e2c28;
      --text-op:    #a07828;
      --text-fn:    #706e68;
      --text-clr:   #a04038;
      --text-expr:  #a09e98;
      --brand-col:  #a07828;
      --brand-op:   1;
      --inset:      rgba(255,255,255,0.8);
      --glow-a:     rgba(200,170,100,0.12);
      --glow-b:     rgba(100,120,180,0.05);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-body);
      background-image:
        radial-gradient(ellipse at 20% 0%,   var(--glow-a) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, var(--glow-b) 0%, transparent 60%);
      font-family: 'Jost', sans-serif;
      transition: background 0.35s;
    }

    .calc {
      width: 360px;
      background: var(--bg-calc);
      border-radius: 32px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--inset),
        0 4px 8px rgba(0,0,0,0.15),
        0 24px 64px rgba(0,0,0,0.22),
        inset 0 1px 0 var(--inset);
      transition: background 0.35s, border-color 0.35s;
    }

    .calc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.22em;
      color: var(--brand-col);
      text-transform: uppercase;
      opacity: var(--brand-op);
      transition: color 0.35s;
    }

    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-fn);
      text-transform: uppercase;
      user-select: none;
      transition: color 0.35s;
      min-width: 28px;
    }
    .toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute; inset: 0;
      border-radius: 11px;
      background: var(--bg-btn-fn);
      border: 1px solid var(--border);
      transition: background 0.3s, border-color 0.3s;
    }
    .toggle input:checked ~ .toggle-track {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-color: var(--gold-dark);
    }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--text-fn);
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
    }
    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(18px);
      background: #fff;
    }

    /* Display */
    .display {
      padding: 14px 26px 20px;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      position: relative;
      gap: 4px;
    }
    .display::after {
      content: '';
      position: absolute;
      bottom: 0; left: 24px; right: 24px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border-div), transparent);
    }

    /* Expression: shows full typed equation e.g. "5 + 5 +" */
    .expr-full {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 300;
      color: var(--text-expr);
      min-height: 24px;
      letter-spacing: 0.04em;
      text-align: right;
      width: 100%;
      word-break: break-all;
      line-height: 1.5;
      transition: color 0.35s;
    }

    /* Big number */
    .result {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      color: var(--text-main);
      line-height: 1;
      letter-spacing: -0.02em;
      text-align: right;
      font-size: 52px;
      width: 100%;
      word-break: break-all;
      transition: color 0.15s, font-size 0.1s;
    }
    .result.accent { color: var(--gold); }
    .result.small  { font-size: 36px; }
    .result.xsmall { font-size: 26px; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: 0 0 32px 32px;
      overflow: hidden;
      transition: background 0.35s;
    }

    .btn {
      background: var(--bg-btn);
      border: none;
      color: var(--text-num);
      font-family: 'Jost', sans-serif;
      font-size: 19px;
      font-weight: 300;
      height: 78px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s, transform 0.08s;
      outline: none;
      user-select: none;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover  { background: var(--bg-btn-hov); color: var(--text-main); }
    .btn:active { transform: scale(0.92); }

    .btn.op { color: var(--text-op); font-size: 21px; }
    .btn.op:hover { background: var(--bg-op-hov); color: var(--gold-light); }

    .btn.fn {
      background: var(--bg-btn-fn);
      color: var(--text-fn);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
    }
    .btn.fn:hover { background: var(--bg-fn-hov); color: var(--text-num); }

    .btn.clear {
      background: var(--bg-btn-fn);
      color: var(--text-clr);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
    }
    .btn.clear:hover { background: var(--bg-clr-hov); }

    .btn.eq {
      background: linear-gradient(145deg, var(--gold), var(--gold-dark));
      color: var(--gold-text);
      font-size: 26px;
      font-weight: 400;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .btn.eq:hover  { background: linear-gradient(145deg, var(--gold-light), var(--gold)); }
    .btn.eq:active { transform: scale(0.92); }

    .btn.zero {
      grid-column: span 2;
      justify-content: flex-start;
      padding-left: 30px;
    }

    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(200,169,110,0.09);
      transform: scale(0);
      animation: rip 0.45s ease-out;
      pointer-events: none;
    }
    @keyframes rip { to { transform: scale(5); opacity: 0; } }
  </style>
</head>
<body>

<div class="calc">
  <div class="calc-header">
    <span class="brand">Aurum</span>
    <div class="toggle-wrap">
      <span class="toggle-label" id="theme-label">Dark</span>
      <label class="toggle">
        <input type="checkbox" id="theme-toggle" onchange="switchTheme(this)" />
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>
  </div>

  <div class="display">
    <div class="expr-full" id="expr-full">&nbsp;</div>
    <div class="result"    id="result">0</div>
  </div>

  <div class="grid">
    <button class="btn clear" onclick="ac(this,event)">AC</button>
    <button class="btn fn"    onclick="doSign(this,event)">+/−</button>
    <button class="btn fn"    onclick="doPct(this,event)">%</button>
    <button class="btn op"    onclick="doOp('÷',this,event)">÷</button>

    <button class="btn" onclick="digit('7',this,event)">7</button>
    <button class="btn" onclick="digit('8',this,event)">8</button>
    <button class="btn" onclick="digit('9',this,event)">9</button>
    <button class="btn op" onclick="doOp('×',this,event)">×</button>

    <button class="btn" onclick="digit('4',this,event)">4</button>
    <button class="btn" onclick="digit('5',this,event)">5</button>
    <button class="btn" onclick="digit('6',this,event)">6</button>
    <button class="btn op" onclick="doOp('−',this,event)">−</button>

    <button class="btn" onclick="digit('1',this,event)">1</button>
    <button class="btn" onclick="digit('2',this,event)">2</button>
    <button class="btn" onclick="digit('3',this,event)">3</button>
    <button class="btn op" onclick="doOp('+',this,event)">+</button>

    <button class="btn zero" onclick="digit('0',this,event)">0</button>
    <button class="btn"      onclick="doDot(this,event)">.</button>
    <button class="btn eq"   onclick="doEq(this,event)">=</button>
  </div>
</div>

<script>
  /*
    State:
      accumulator — running total so far (number | null)
      pendingOp   — operator to apply next (string | null)
      currentStr  — string the user is currently typing
      freshEntry  — true = next digit/dot starts a NEW number (after op or =)
      justCalced  — true = last action was =

    Expression display (exprTokens):
      Stores every typed token exactly as entered: ['5', '+', '5', '+', '3']
      Numbers are NEVER replaced with computed results — only the big display
      shows the running total when chaining.
  */
  let accumulator = null;
  let pendingOp   = null;
  let currentStr  = '0';
  let freshEntry  = true;
  let justCalced  = false;
  let exprTokens  = [];       // display only — never mutated by evaluation

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expr-full');

  /* ── Render helpers ── */
  function showBig(val, accent) {
    const s = String(val);
    resultEl.textContent = s;
    resultEl.className = 'result'
      + (accent  ? ' accent'  : '')
      + (s.length > 12 ? ' xsmall' : s.length > 9 ? ' small' : '');
  }

  function showExpr() {
    exprEl.textContent = exprTokens.length ? exprTokens.join(' ') : '\u00a0';
  }

  /* ── Ripple ── */
  function ripple(btn, e) {
    if (!btn || !e) return;
    const r = document.createElement('span');
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.className = 'ripple';
    r.style.cssText = `width:${size}px;height:${size}px;`
      + `left:${e.clientX - rect.left - size/2}px;`
      + `top:${e.clientY  - rect.top  - size/2}px`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 500);
  }

  /* ── Input ── */

  function digit(d, btn, e) {
    ripple(btn, e);

    if (justCalced) {
      // After = : fully reset, start new calculation
      accumulator = null;
      pendingOp   = null;
      exprTokens  = [];
      currentStr  = d === '0' ? '0' : d;
      freshEntry  = false;
      justCalced  = false;
      exprTokens.push(currentStr);
      showBig(currentStr);
      showExpr();
      return;
    }

    if (freshEntry) {
      // First digit after an operator — start a brand new number
      currentStr = d === '0' ? '0' : d;
      freshEntry = false;
      exprTokens.push(currentStr);          // add new number token
    } else {
      // Continue building current number
      if (currentStr === '0' && d !== '.') currentStr = d;
      else if (currentStr.length < 13)     currentStr += d;
      // Update the last token (always a number at this point)
      exprTokens[exprTokens.length - 1] = currentStr;
    }

    showBig(currentStr);
    showExpr();
  }

  function doDot(btn, e) {
    ripple(btn, e);

    if (justCalced) {
      accumulator = null; pendingOp = null; exprTokens = [];
      currentStr = '0.'; freshEntry = false; justCalced = false;
      exprTokens.push(currentStr);
      showBig(currentStr); showExpr();
      return;
    }

    if (freshEntry) {
      currentStr = '0.';
      freshEntry = false;
      exprTokens.push(currentStr);
    } else if (!currentStr.includes('.')) {
      currentStr += '.';
      exprTokens[exprTokens.length - 1] = currentStr;
    }

    showBig(currentStr);
    showExpr();
  }

  function doOp(op, btn, e) {
    ripple(btn, e);
    justCalced = false;

    if (freshEntry && exprTokens.length > 0) {
      // User pressed two operators in a row — just swap the last op token
      exprTokens[exprTokens.length - 1] = op;
      pendingOp = op;
      showExpr();
      return;
    }

    const current = parseFloat(currentStr);

    if (accumulator === null) {
      // Very first operand
      accumulator = current;
    } else {
      // Chain: evaluate previous op, keep result in accumulator
      // but DON'T touch exprTokens — leave original numbers intact
      accumulator = applyOp(pendingOp, accumulator, current);
      if (accumulator === null) { ac(null, null); return; } // div by zero
      // Show running total in the big display only
      showBig(fmt(accumulator));
    }

    pendingOp  = op;
    freshEntry = true;

    // Append operator token to expression (numbers stay as typed)
    exprTokens.push(op);
    showExpr();
  }

  function doEq(btn, e) {
    ripple(btn, e);
    if (pendingOp === null || accumulator === null) return;

    const current = parseFloat(currentStr);

    // Make sure current number is the last token
    if (exprTokens.length > 0 && isOp(exprTokens[exprTokens.length - 1])) {
      exprTokens.push(fmt(current));
    } else {
      exprTokens[exprTokens.length - 1] = fmt(current);
    }
    exprTokens.push('=');

    const result = applyOp(pendingOp, accumulator, current);
    const resultStr = result === null ? 'Error' : fmt(result);

    showExpr();
    showBig(resultStr, true);

    // Reset for next calculation
    accumulator = result === null ? null : result;
    pendingOp   = null;
    currentStr  = resultStr;
    freshEntry  = true;
    justCalced  = true;
  }

  function ac(btn, e) {
    ripple(btn, e);
    accumulator = null; pendingOp = null;
    currentStr  = '0';  freshEntry = true; justCalced = false;
    exprTokens  = [];
    showBig('0'); showExpr();
  }

  function doSign(btn, e) {
    ripple(btn, e);
    if (currentStr === '0' || currentStr === 'Error') return;
    currentStr = currentStr.startsWith('-') ? currentStr.slice(1) : '-' + currentStr;
    if (exprTokens.length > 0 && !isOp(exprTokens[exprTokens.length - 1])) {
      exprTokens[exprTokens.length - 1] = currentStr;
    }
    showBig(currentStr); showExpr();
  }

  function doPct(btn, e) {
    ripple(btn, e);
    if (currentStr === 'Error') return;
    currentStr = fmt(parseFloat(currentStr) / 100);
    if (exprTokens.length > 0 && !isOp(exprTokens[exprTokens.length - 1])) {
      exprTokens[exprTokens.length - 1] = currentStr;
    }
    showBig(currentStr); showExpr();
  }

  /* ── Maths ── */
  function applyOp(op, a, b) {
    if (op === '+') return a + b;
    if (op === '−') return a - b;
    if (op === '×') return a * b;
    if (op === '÷') return b === 0 ? null : a / b;
    return b;
  }

  function fmt(n) {
    if (n === null || isNaN(n)) return 'Error';
    return parseFloat(n.toPrecision(12)).toString();
  }

  function isOp(t) { return ['÷','×','−','+','='].includes(t); }

  /* ── Theme ── */
  function switchTheme(cb) {
    document.documentElement.setAttribute('data-theme', cb.checked ? 'light' : 'dark');
    document.getElementById('theme-label').textContent = cb.checked ? 'Light' : 'Dark';
  }

  /* ── Keyboard ── */
  document.addEventListener('keydown', function(e) {
    if (e.key >= '0' && e.key <= '9')   digit(e.key, null, null);
    else if (e.key === '.')              doDot(null, null);
    else if (e.key === '+')              doOp('+', null, null);
    else if (e.key === '-')              doOp('−', null, null);
    else if (e.key === '*')              doOp('×', null, null);
    else if (e.key === '/') { e.preventDefault(); doOp('÷', null, null); }
    else if (e.key === 'Enter' || e.key === '=') doEq(null, null);
    else if (e.key === 'Escape')         ac(null, null);
    else if (e.key === 'Backspace') {
      if (!freshEntry && !justCalced && currentStr !== 'Error') {
        currentStr = currentStr.length > 1 ? currentStr.slice(0, -1) : '0';
        if (exprTokens.length > 0 && !isOp(exprTokens[exprTokens.length - 1])) {
          exprTokens[exprTokens.length - 1] = currentStr;
        }
        showBig(currentStr); showExpr();
      }
    }
  });
</script>
</body>
</html>
